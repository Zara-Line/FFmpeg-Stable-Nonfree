# .github/workflows/sync-release-to-codeberg.yml
name: Sync GitHub Release to Codeberg

on:
  workflow_dispatch:
      inputs:
        tag_name:
          description: 'Release tag to sync'
          required: true
          type: string
  release:
    # Trigger when GitHub release is published or edited
    types: [published, edited]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Read release information
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for tags

      - name: Install forgejo-cli (fj)
        run: |
          # Download latest fj binary
          curl -L https://codeberg.org/forgejo-contrib/forgejo-cli/releases/download/latest/forgejo-cli-linux-amd64 -o fj
          chmod +x fj
          sudo mv fj /usr/local/bin/

      - name: Get Release Info
        id: release_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Get info from manual input
            TAG_NAME="${{ inputs.tag_name }}"
            # Fetch release info via GitHub CLI
            RELEASE_INFO=$(gh release view "$TAG_NAME" --json name,body,prerelease)
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "release_name=$(echo $RELEASE_INFO | jq -r .name)" >> $GITHUB_OUTPUT
            echo "$(echo $RELEASE_INFO | jq -r .body)" > release_body.md
            echo "body_file=release_body.md" >> $GITHUB_OUTPUT
            if [ "$(echo $RELEASE_INFO | jq -r .prerelease)" = "true" ]; then
              echo "prerelease_flag=--prerelease" >> $GITHUB_OUTPUT
            fi
          else
            # Normal release event
            echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "release_name=${{ github.event.release.name }}" >> $GITHUB_OUTPUT
            echo "${{ github.event.release.body }}" > release_body.md
            echo "body_file=release_body.md" >> $GITHUB_OUTPUT
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              echo "prerelease_flag=--prerelease" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Sync to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          # Configure fj to use Codeberg
          export FORGEJO_TOKEN="$CODEBERG_TOKEN"

          # Check if release already exists on Codeberg
          # Create if not exists, update if exists
          if fj release view "${{ steps.release_info.outputs.tag_name }}" \
             --repo "${{ secrets.CODEBERG_REPO }}" 2>/dev/null; then
            echo "Release exists, updating..."
            fj release edit "${{ steps.release_info.outputs.tag_name }}" \
              --repo "${{ secrets.CODEBERG_REPO }}" \
              --title "${{ steps.release_info.outputs.release_name }}" \
              --body-file "${{ steps.release_info.outputs.body_file }}" \
              ${{ steps.release_info.outputs.prerelease_flag }}
          else
            echo "Creating new release..."
            fj release create "${{ steps.release_info.outputs.tag_name }}" \
              --repo "${{ secrets.CODEBERG_REPO }}" \
              --title "${{ steps.release_info.outputs.release_name }}" \
              --body-file "${{ steps.release_info.outputs.body_file }}" \
              ${{ steps.release_info.outputs.prerelease_flag }}
          fi

      - name: Upload Release Assets
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download and upload GitHub release assets
          ASSETS_URL="${{ github.event.release.assets_url }}"

          # Use GitHub CLI to download all assets from the release
          gh release download "${{ steps.release_info.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --dir ./assets \
            --skip-existing

          # Upload each asset to Codeberg
          for asset in ./assets/*; do
            if [ -f "$asset" ]; then
              echo "Uploading $asset to Codeberg..."
              fj release upload "${{ steps.release_info.outputs.tag_name }}" \
                --repo "${{ secrets.CODEBERG_REPO }}" \
                --file "$asset"
            fi
          done
